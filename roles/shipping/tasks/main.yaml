- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: java setup
  ansible.builtin.import_role:
    name: common
    tasks_from: java-setup.yaml

- name: systemd setup
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-setup.yaml

- name: install mysql client
  ansible.builtin.dnf:
    name: mysql
    state: present

- name: Install PyMySQL dependency
  ansible.builtin.pip:
    name: PyMySQL

- name: Check if {{ component }} database exists
  ansible.builtin.shell: |
    mysql -h mysql.heman.icu -uroot -pRoboShop@1 -N -e "SHOW DATABASES LIKE 'cities';"
  register: shipping_output
  changed_when: false
  failed_when: false

- name: load products into mysql
  community.mysql.mysql_db:
      name: all
      state: import
      target: "{{ item }}"
      login_host: "{{ MYSQL_HOST }}"
      login_user: "{{ MYSQL_USER }}"
      login_password: "{{ MYSQL_PASSWORD }}"
  loop: 
  - /app/db/schema.sql
  - /app/db/app-user.sql 
  - /app/db/master-data.sql
  when: shipping_output.stdout != "cities"

- name: restart {{ component }} service
  ansible.builtin.systemd_service:
    name: "{{ component }}"
    state: restarted