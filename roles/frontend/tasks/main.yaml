- name: disable default nginx
  ansible.builtin.command: dnf module disable nginx -y

- name: enable nginx 1.24
  ansible.builtin.command: dnf module enable nginx:1.24 -y

- name: install nginx
  ansible.builtin.dnf:
    name: nginx 
    state: present

- name: start, enable nginx
  ansible.builtin.service:
    name: nginx 
    state: started
    enabled: yes

- name: remove default html 
  ansible.builtin.file:
    state: absent
    path: /usr/share/nginx/html

- name: create html 
  ansible.builtin.file:
    state: directory
    path: /usr/share/nginx/html 

- name: download {{ component }} application
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip 

- name: unzip {{ component }} application
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /usr/share/nginx/html
    remote_src: yes

- name: copy {{ component }} service
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: restart nginx