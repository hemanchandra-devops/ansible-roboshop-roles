- name: create roboshop system user
  ansible.builtin.user:
    name: roboshop
    comment: roboshop system user
    system: true
    shell: /sbin/nologin

- name: delete existing app directory
  ansible.builtin.file:
    state: absent
    path: /app

- name: create app directory
  ansible.builtin.file:
    state: directory
    path: /app

- name: delete existing {{ component }} application
  ansible.builtin.file:
    state: absent
    path: /tmp/{{ component }}.zip

- name: download {{ component }} application
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip

- name: unzip {{ component }} application
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes