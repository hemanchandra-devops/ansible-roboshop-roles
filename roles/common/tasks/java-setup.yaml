- name: install maven
  ansible.builtin.dnf:
    name: maven
    state: present

- name: mvn clean package 
  ansible.builtin.command: mvn clean package
  args:
    chdir: /app

- name: move jar file
  ansible.builtin.command: mv target/{{ component }}-1.0.jar {{ component }}.jar 
  args:
    chdir: /app 