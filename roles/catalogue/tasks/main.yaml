- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml
  tags:
  - deployment

- name: nodejs setup
  ansible.builtin.import_role:
    name: common
    tasks_from: nodejs-setup.yaml
  tags:
  - deployment

- name: systemd setup
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-setup.yaml

- name: copy mongo repo
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: install mongodb client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: Check if catalogue database exists
  ansible.builtin.command: mongosh mongodb.heman.icu --quiet --eval "db.getMongo().getDBNames().includes('catalogue')"
  register: catalogue_output

- name: load products into mongodb
  ansible.builtin.shell: mongosh --host mongodb.heman.icu </app/db/master-data.js
  when: catalogue_output.stdout == "false"

- name: restart {{ component }} service
  ansible.builtin.systemd_service:
    name: "{{ component }}"
    state: restarted